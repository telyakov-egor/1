<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подключение к игре | Квизли</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .join-container {
            max-width: 450px;
            width: 100%;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: white;
            font-size: 48px;
            font-weight: 800;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .join-card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 8px;
        }

        .code-input {
            width: 100%;
            padding: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            letter-spacing: 8px;
            font-family: monospace;
            color: #fd5b01;
            background: #f7fafc;
        }

        .code-input:focus {
            outline: none;
            border-color: #fd5b01;
        }

        .name-input {
            width: 100%;
            padding: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 18px;
            transition: all 0.2s;
        }

        .name-input:focus {
            outline: none;
            border-color: #fd5b01;
        }

        .btn {
            width: 100%;
            padding: 18px;
            background: #fd5b01;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 20px;
        }

        .btn:hover {
            background: #e64e00;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(253, 91, 1, 0.3);
        }

        .info {
            margin-top: 20px;
            padding: 16px;
            background: #f7fafc;
            border-radius: 12px;
            font-size: 14px;
            color: #4a5568;
            text-align: center;
        }

        .error {
            color: #e53e3e;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }

        .error.show {
            display: block;
        }

        .powered {
            margin-top: 30px;
            text-align: center;
            color: rgba(255,255,255,0.8);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="join-container">
        <div class="logo">
            <h1>КВИЗЛИ</h1>
        </div>
        
        <div class="join-card">
            <div class="form-group">
                <label>Код игры</label>
                <input type="text" class="code-input" id="gameCode" placeholder="XXXXX" maxlength="5" value="">
            </div>
            
            <div class="form-group">
                <label>Название команды</label>
                <input type="text" class="name-input" id="teamName" placeholder="Введите название команды" value="Команда">
            </div>
            
            <button class="btn" id="joinBtn">
                <i class="fas fa-sign-in-alt"></i> Войти в игру
            </button>
            
            <div class="error" id="errorMessage">
                <i class="fas fa-exclamation-circle"></i> Неверный код игры
            </div>
            
            <div class="info">
                <i class="fas fa-info-circle"></i> Введите код игры, который сообщил ведущий
            </div>
        </div>
        
        <div class="powered">
            Сделано на платформе «Квизли»
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    <script>
        // Получаем код из URL при загрузке страницы
        const urlParams = new URLSearchParams(window.location.search);
        const codeFromUrl = urlParams.get('code');
        
        if (codeFromUrl) {
            document.getElementById('gameCode').value = codeFromUrl;
        }

        document.getElementById('joinBtn').addEventListener('click', async () => {
            const code = document.getElementById('gameCode').value.trim().toUpperCase();
            const teamName = document.getElementById('teamName').value.trim() || 'Команда';
            
            if (!code) {
                showError('Введите код игры');
                return;
            }
            
            if (code.length !== 5) {
                showError('Код должен содержать 5 символов');
                return;
            }
            
            try {
                const response = await fetch('/api/session/join', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code, teamName })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    showError(data.error);
                    return;
                }
                
                if (data.success) {
                    // Сохраняем информацию о команде
                    localStorage.setItem('teamId', data.teamId);
                    localStorage.setItem('teamName', teamName);
                    localStorage.setItem('sessionId', data.sessionId);
                    
                    // Переходим на экран игрока
                    window.location.href = `/player.html?sessionId=${data.sessionId}&teamId=${data.teamId}`;
                }
            } catch (error) {
                console.error('Ошибка:', error);
                showError('Ошибка подключения к серверу');
            }
        });

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.classList.add('show');
            
            setTimeout(() => {
                errorEl.classList.remove('show');
            }, 3000);
        }

        // Enter для отправки
        document.getElementById('gameCode').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('joinBtn').click();
            }
        });
        
        document.getElementById('teamName').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('joinBtn').click();
            }
        });
    </script>
</body>
</html>
